name: Android CI/CD Pipeline

on:
  push:
    branches:
      - main
      - release
      - release/*
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no real build/upload)"
        required: false
        default: false
        type: boolean

concurrency:
  group: android-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  pipeline:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout & Setup
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20  # For git log in metadata agent
          submodules: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Verify Fastlane
        run: |
          bundle exec fastlane --version

      # ---------------------------------------------------------------
      # 2. Run Tests (pre-flight check)
      # ---------------------------------------------------------------
      - name: Run agent unit tests
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=.pipeline/test-results.xml

      # ---------------------------------------------------------------
      # 3. Initialize Pipeline
      # ---------------------------------------------------------------
      - name: Initialize pipeline
        run: |
          python -m agents.orchestrator \
            --init \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

      # ---------------------------------------------------------------
      # 4. Run Pipeline
      # ---------------------------------------------------------------
      - name: Run pipeline
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          PLAY_TRACK: ${{ vars.PLAY_TRACK || 'internal' }}
          VERSION_CODE_OVERRIDE: ${{ vars.VERSION_CODE_OVERRIDE || '' }}
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 || secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m agents.orchestrator --run

      - name: Run pipeline (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          python -m agents.orchestrator --dry-run

      # ---------------------------------------------------------------
      # 5. Upload Artifacts
      # ---------------------------------------------------------------
      - name: Upload pipeline state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state
          path: .pipeline/
          retention-days: 30

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app/build/outputs/bundle/prodRelease/*.aab
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pipeline/test-results.xml
          retention-days: 30

      # ---------------------------------------------------------------
      # 6. Pipeline Status
      # ---------------------------------------------------------------
      - name: Print pipeline summary
        if: always()
        run: |
          python -m agents.orchestrator --status || true
