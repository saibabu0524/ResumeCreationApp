name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Ktlint
      run: ./gradlew ktlintCheck

    - name: Run Detekt
      run: ./gradlew detekt

    - name: Run Dependency Guard Verify
      run: ./gradlew dependencyGuardVerify
