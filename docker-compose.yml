version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: resume_backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - resume-net
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: resume_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - resume-net
    # Optional: configure GPU passthrough here if host has NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  resume-net:
    driver: bridge

volumes:
  ollama_data:
