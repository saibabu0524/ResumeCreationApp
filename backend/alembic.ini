# Generic single-database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Filled at runtime from SQLALCHEMY_DATABASE_URI env var or the Settings class.
# See alembic/env.py for how this is wired up.
sqlalchemy.url = sqlite+aiosqlite:///./db.sqlite3

[post_write_hooks]
# Run Ruff after every revision file is generated.
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
