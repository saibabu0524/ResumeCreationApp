services:
  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: always

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://resumetailor.in/api/v1
    container_name: resume_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://resumetailor.in/api/v1
    depends_on:
      api:
        condition: service_started
    restart: always

  # ── FastAPI API server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    # We do not expose port 8000 externally; Nginx routes traffic here
    # ports:
    #   - "8000:8000"
    volumes:
      # Persist uploaded files across container restarts. No source code mapping in prod
      - uploads_data:/app/uploads
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    # Prod command (no --reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"

  # ── ARQ background worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    volumes:
      - uploads_data:/app/uploads
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: always
    command: arq app.workers.arq_worker.WorkerSettings

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # Internal to the network only, no need to expose port externally
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  redis_data:
  uploads_data:
  sqlite_data:
